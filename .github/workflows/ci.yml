name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Check formatting
        run: python -m black --check api_app.py crypto_config.py crypto_core.py pqc_agent_tools.py pqc_app.py ui_helpers.py setup.py tests/test_agent_tools.py tests/test_api_app.py tests/test_crypto_core.py tests/test_ui_helpers.py

      - name: Lint
        run: python -m flake8 api_app.py crypto_config.py crypto_core.py pqc_agent_tools.py pqc_app.py ui_helpers.py setup.py tests/test_agent_tools.py tests/test_api_app.py tests/test_crypto_core.py tests/test_ui_helpers.py

      - name: Type check
        run: python -m mypy api_app.py crypto_config.py crypto_core.py pqc_agent_tools.py pqc_app.py ui_helpers.py tests/test_agent_tools.py tests/test_api_app.py tests/test_crypto_core.py tests/test_ui_helpers.py

      - name: Unit tests without native liboqs
        run: >
          PYTHON=python ./test.sh
          --cov=crypto_core
          --cov=pqc_agent_tools
          --cov=ui_helpers
          --cov=api_app
          --cov-report=term-missing
          --cov-fail-under=80

  package:
    name: Build and install package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install build tooling
        run: python -m pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build package artifacts
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Install built wheel
        run: |
          python -m venv /tmp/qe-wheel-test
          . /tmp/qe-wheel-test/bin/activate
          python -m pip install dist/*.whl
          quantum-encryptor-agent health --json

      - name: Smoke installed web UI
        run: |
          . /tmp/qe-wheel-test/bin/activate
          PORT=4002 python -m api_app &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4002/ | grep -q '<div id="root"></div>'; then
              curl -fsS http://127.0.0.1:4002/api/health >/dev/null
              exit 0
            fi
            sleep 1
          done
          exit 1

  security:
    name: Security checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install security tooling
        run: python -m pip install -r requirements-dev.txt

      - name: Audit runtime dependency spec
        run: python -m pip_audit -r requirements.txt

      - name: Audit locked runtime dependencies
        run: python -m pip_audit -r requirements-lock.txt

      - name: Audit locked development dependencies
        run: python -m pip_audit -r requirements-dev-lock.txt

      - name: Run Python security lint
        run: python -m bandit -q -r crypto_core.py pqc_agent_tools.py pqc_app.py ui_helpers.py

  web:
    name: Custom web UI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Type check frontend
        run: npm run check

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser UI smoke
        run: |
          SKIP_WEB_BUILD=1 PYTHON=python ./start.sh &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4000/api/health >/dev/null; then
              npm run ui-smoke
              exit 0
            fi
            sleep 1
          done
          exit 1

  locked-runtime-install:
    name: Locked runtime install
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install locked runtime dependencies
        run: python -m pip install --require-hashes -r requirements-lock.txt

      - name: Verify package imports
        run: |
          python - <<'PY'
          import crypto_config
          import crypto_core
          import api_app
          import pqc_agent_tools
          import ui_helpers

          print("locked runtime import check ok")
          PY

  native-oqs:
    name: Native liboqs integration tests
    runs-on: ubuntu-latest

    env:
      OQS_INSTALL_PATH: ${{ github.workspace }}/.local/oqs
      LD_LIBRARY_PATH: ${{ github.workspace }}/.local/oqs/lib:${{ github.workspace }}/.local/oqs/lib64

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Build and install native liboqs
        run: |
          git clone --depth=1 https://github.com/open-quantum-safe/liboqs.git .ci/liboqs
          cmake -S .ci/liboqs -B .ci/liboqs/build \
            -GNinja \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_INSTALL_PREFIX="${OQS_INSTALL_PATH}"
          cmake --build .ci/liboqs/build --parallel 2
          cmake --install .ci/liboqs/build

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Verify native backend is active
        run: |
          python - <<'PY'
          import oqs

          getter = getattr(oqs, "get_enabled_kem_mechanisms", None)
          if getter is None:
              getter = oqs.get_enabled_KEM_mechanisms

          enabled = set(getter())
          assert {"ML-KEM-768", "Kyber768"} & enabled, sorted(enabled)[:20]
          PY

      - name: OQS-backed test suite
        run: PYTHON=python ./test.sh

      - name: Agent CLI native round trip
        run: |
          printf 'agent round trip\n' > agent-input.txt
          PQC_PRIVATE_KEY_PASSWORD='correct horse battery staple' \
            python -m pqc_agent_tools generate-keys \
              --public-out agent-public.pem \
              --private-out agent-private.pem
          python -m pqc_agent_tools inspect-key --key agent-private.pem
          python -m pqc_agent_tools encrypt \
            --input agent-input.txt \
            --public-key agent-public.pem \
            --output agent-input.pqc
          python -m pqc_agent_tools inspect-file --input agent-input.pqc
          PQC_PRIVATE_KEY_PASSWORD='correct horse battery staple' \
            python -m pqc_agent_tools verify-file \
              --input agent-input.pqc \
              --private-key agent-private.pem
          PQC_PRIVATE_KEY_PASSWORD='correct horse battery staple' \
            python -m pqc_agent_tools decrypt \
              --input agent-input.pqc \
              --private-key agent-private.pem \
              --output agent-output.txt
          cmp agent-input.txt agent-output.txt
