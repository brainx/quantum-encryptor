name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-release-artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest
    needs: native-oqs-release

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Python build tooling
        run: python -m pip install -r requirements-dev.txt

      - name: Audit runtime dependency spec
        run: python -m pip_audit -r requirements.txt

      - name: Audit locked runtime dependencies
        run: python -m pip_audit -r requirements-lock.txt

      - name: Audit locked development dependencies
        run: python -m pip_audit -r requirements-dev-lock.txt

      - name: Run Python security lint
        run: python -m bandit -q -r crypto_core.py pqc_agent_tools.py pqc_app.py ui_helpers.py api_app.py

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit web dependencies
        run: npm audit --audit-level=high

      - name: Build frontend
        run: npm run build

      - name: Type check frontend
        run: npm run check

      - name: Run Python tests
        run: >
          PYTHON=python ./test.sh
          --cov=crypto_core
          --cov=pqc_agent_tools
          --cov=ui_helpers
          --cov=api_app
          --cov-report=term-missing
          --cov-fail-under=80

      - name: Build Python package
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Install built wheel
        run: |
          python -m venv /tmp/qe-release-test
          /tmp/qe-release-test/bin/python -m pip install dist/*.whl
          cd "$(mktemp -d)"
          /tmp/qe-release-test/bin/quantum-encryptor-agent health --json
          /tmp/qe-release-test/bin/python -I - <<'PY'
          from pathlib import Path
          import sys

          import api_app
          import pqc_agent_tools

          prefix = Path(sys.prefix).resolve()
          for module in (api_app, pqc_agent_tools):
              module_path = Path(module.__file__).resolve()
              assert module_path.is_relative_to(prefix), (module.__name__, module_path, prefix)
          PY

      - name: Smoke installed web UI
        run: |
          cd "$(mktemp -d)"
          PORT=4002 /tmp/qe-release-test/bin/python -I -m api_app &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4002/ | grep -q '<div id="root"></div>'; then
              curl -fsS http://127.0.0.1:4002/api/health >/dev/null
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Generate artifact checksums
        run: |
          cd dist
          shasum -a 256 * > SHA256SUMS.txt

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: quantum-encryptor-dist
          path: dist/*

  publish-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build-release-artifacts
    permissions:
      actions: read
      contents: write

    steps:
      - name: Check out release metadata
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Download verified artifacts
        uses: actions/download-artifact@v5
        with:
          name: quantum-encryptor-dist
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          dist/*
          --title "$GITHUB_REF_NAME"
          --notes-file CHANGELOG.md
          --verify-tag

  native-oqs-release:
    name: Native liboqs release gate
    runs-on: ubuntu-latest

    env:
      OQS_INSTALL_PATH: ${{ github.workspace }}/.local/oqs
      LD_LIBRARY_PATH: ${{ github.workspace }}/.local/oqs/lib:${{ github.workspace }}/.local/oqs/lib64

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Build and install native liboqs
        run: |
          git init .ci/liboqs
          git -C .ci/liboqs remote add origin https://github.com/open-quantum-safe/liboqs.git
          # liboqs 0.15.0
          git -C .ci/liboqs fetch --depth=1 origin 97f6b86b1b6d109cfd43cf276ae39c2e776aed80
          git -C .ci/liboqs checkout --detach 97f6b86b1b6d109cfd43cf276ae39c2e776aed80
          cmake -S .ci/liboqs -B .ci/liboqs/build \
            -GNinja \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_INSTALL_PREFIX="${OQS_INSTALL_PATH}"
          cmake --build .ci/liboqs/build --parallel 2
          cmake --install .ci/liboqs/build

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run native-backed test suite
        run: PYTHON=python ./test.sh

      - name: Agent CLI native round trip
        run: |
          printf 'agent round trip\n' > agent-input.txt
          PQC_PRIVATE_KEY_PASSWORD='correct horse battery staple' \
            python -m pqc_agent_tools generate-keys \
              --public-out agent-public.pem \
              --private-out agent-private.pem
          python -m pqc_agent_tools encrypt \
            --input agent-input.txt \
            --public-key agent-public.pem \
            --output agent-input.pqc
          PQC_PRIVATE_KEY_PASSWORD='correct horse battery staple' \
            python -m pqc_agent_tools decrypt \
              --input agent-input.pqc \
              --private-key agent-private.pem \
              --output agent-output.txt
          cmp agent-input.txt agent-output.txt
